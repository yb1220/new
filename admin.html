<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="我的工具">
  <title>我的工具 - 管理</title>
  <style>
    :root {
      --color-bg-primary: #1a1a1a;
      --color-bg-secondary: #242424;
      --color-bg-tertiary: #2a2a2a;
      --color-bg-card: #2f2f2f;
      --color-border: #3a3a3a;
      --color-text-primary: #ffffff;
      --color-text-secondary: #b0b0b0;
      --color-text-tertiary: #808080;
      --color-active: #69F0AE;
      --color-danger: #ff6b6b;
      --spacing-lg: 12px;
      --spacing-md: 10px;
      --spacing-sm: 6px;
      --font-size-xs: 11px;
      --font-size-sm: 13px;
      --font-size-base: 15px;
      --font-size-md: 17px;
      --font-size-lg: 19px;
      --radius-lg: 14px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--color-bg-primary);
      color: var(--color-text-secondary);
      font-size: var(--font-size-base);
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      min-height: 100dvh;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: var(--spacing-lg);
      background: var(--color-bg-secondary);
      border-bottom: 1px solid var(--color-border);
      position: sticky;
      top: 0;
      z-index: 100;
      flex-shrink: 0;
    }

    .header-left {
      color: var(--color-active);
      font-size: var(--font-size-md);
      font-weight: 600;
      cursor: pointer;
      user-select: none;
    }

    .header-center {
      color: var(--color-text-primary);
      font-size: var(--font-size-lg);
      font-weight: 600;
    }

    .header-right {
      color: var(--color-active);
      font-size: var(--font-size-lg);
      cursor: pointer;
      user-select: none;
    }

    .sections-tabs {
      display: flex;
      gap: 8px;
      padding: var(--spacing-lg);
      background: var(--color-bg-secondary);
      border-bottom: 1px solid var(--color-border);
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      flex-shrink: 0;
    }

    .sections-tabs::-webkit-scrollbar {
      display: none;
    }

    .tab {
      padding: 8px 16px;
      background: var(--color-bg-tertiary);
      border: 1px solid var(--color-border);
      border-radius: 20px;
      color: var(--color-text-secondary);
      font-size: 13px;
      white-space: nowrap;
      cursor: pointer;
      transition: all 0.2s;
      user-select: none;
    }

    .tab:hover {
      background: var(--color-bg-card);
    }

    .tab.active {
      background: var(--color-active);
      color: #000;
      border-color: var(--color-active);
      font-weight: 600;
    }

    .tab.add {
      color: var(--color-active);
    }

    .content {
      flex: 1;
      padding: var(--spacing-lg);
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    .section-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
      padding: 12px;
      background: var(--color-bg-secondary);
      border-radius: 10px;
      border: 1px solid var(--color-border);
    }

    .section-info {
      flex: 1;
    }

    .section-icon-large {
      font-size: 32px;
      cursor: pointer;
      user-select: none;
    }

    .section-name {
      color: var(--color-text-primary);
      font-size: 17px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .section-meta {
      color: var(--color-text-tertiary);
      font-size: 12px;
    }

    .section-actions {
      display: flex;
      gap: 8px;
    }

    .btn-sm {
      padding: 8px 12px;
      background: var(--color-bg-tertiary);
      border: 1px solid var(--color-border);
      border-radius: 6px;
      color: var(--color-text-secondary);
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .btn-sm:hover {
      background: var(--color-bg-card);
      color: var(--color-text-primary);
    }

    .btn-sm.danger {
      color: var(--color-danger);
      border-color: rgba(255, 107, 107, 0.3);
    }

    .links-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .link-item {
      background: var(--color-bg-secondary);
      border-radius: 10px;
      padding: 12px;
      border: 1px solid var(--color-border);
      display: flex;
      align-items: center;
      gap: 12px;
      transition: all 0.2s;
    }

    .link-item:active {
      background: var(--color-bg-tertiary);
    }

    .link-icon {
      font-size: 28px;
      flex-shrink: 0;
      cursor: pointer;
    }

    .link-info {
      flex: 1;
      min-width: 0;
    }

    .link-title {
      color: var(--color-text-primary);
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .link-desc {
      color: var(--color-text-tertiary);
      font-size: 12px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .link-url {
      color: var(--color-text-tertiary);
      font-size: 11px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .link-actions {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }

    .btn-icon {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--color-bg-tertiary);
      border: 1px solid var(--color-border);
      border-radius: 6px;
      color: var(--color-text-secondary);
      cursor: pointer;
      transition: all 0.2s;
      font-size: 14px;
    }

    .btn-icon:hover {
      background: var(--color-bg-card);
    }

    .btn-icon.danger {
      color: var(--color-danger);
      border-color: rgba(255, 107, 107, 0.3);
    }

    .add-btn {
      width: 100%;
      padding: 12px;
      background: var(--color-active);
      color: #000;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      font-size: 15px;
      cursor: pointer;
      margin-top: 15px;
      transition: all 0.2s;
    }

    .add-btn:hover {
      opacity: 0.9;
    }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--color-text-tertiary);
    }

    .empty-icon {
      font-size: 40px;
      margin-bottom: 12px;
    }

    .modal-backdrop {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.7);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .modal-backdrop.active {
      display: flex;
    }

    .modal {
      background: var(--color-bg-secondary);
      border-radius: 12px;
      padding: 20px;
      width: 100%;
      max-width: 400px;
      border: 1px solid var(--color-border);
      max-height: 90vh;
      overflow-y: auto;
    }

    .modal-title {
      color: var(--color-text-primary);
      font-size: 17px;
      font-weight: 600;
      margin-bottom: 15px;
    }

    .form-group {
      margin-bottom: 15px;
    }

    .form-label {
      display: block;
      color: var(--color-text-secondary);
      font-size: 13px;
      margin-bottom: 6px;
      font-weight: 500;
    }

    .form-input {
      width: 100%;
      padding: 10px;
      background: var(--color-bg-tertiary);
      border: 1px solid var(--color-border);
      border-radius: 6px;
      color: var(--color-text-primary);
      font-size: 13px;
    }

    .form-input::placeholder {
      color: var(--color-text-tertiary);
    }

    .form-buttons {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }

    .form-btn {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 6px;
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .form-btn.confirm {
      background: var(--color-active);
      color: #000;
    }

    .form-btn.cancel {
      background: var(--color-bg-tertiary);
      color: var(--color-text-primary);
      border: 1px solid var(--color-border);
    }

    .menu-modal {
      width: 100%;
      max-width: none;
      border-radius: 12px 12px 0 0;
    }

    .menu-items {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .menu-item {
      padding: 12px;
      background: var(--color-bg-tertiary);
      border-radius: 8px;
      color: var(--color-text-primary);
      cursor: pointer;
      font-size: 15px;
      transition: all 0.2s;
      border: 1px solid var(--color-border);
    }

    .menu-item:hover {
      background: var(--color-bg-card);
    }

    .menu-item.danger {
      color: var(--color-danger);
      border-color: rgba(255, 107, 107, 0.3);
    }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: var(--color-active);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// 🔧 改這裡：填入你的 Supabase 資訊
const SUPABASE_URL = "https://hfsfdhtpjuguehmdyryo.supabase.co";
const SUPABASE_KEY = "sb_publishable_K2LJSqbEgwYro9hl2tua8w_u7Q2rR2i";
const USE_SUPABASE = true;

const STORAGE_KEY = "my_toolbox_data";
const supabase = USE_SUPABASE ? window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY) : null;
const USER_ID = "user_" + (localStorage.getItem("user_id") || (localStorage.setItem("user_id", "user_" + Math.random().toString(36).substr(2, 9)), localStorage.getItem("user_id")));

let sections = {};
let currentSection = null;
let currentEditingMode = null;

// ============ 初始化 ============
async function init() {
  await loadData();
  renderTabs();
  renderContent();
  setupRealtimeSync();
}

// ============ 資料管理 ============
async function loadData() {
  if (USE_SUPABASE && supabase) {
    try {
      const { data, error } = await supabase
        .from("toolbox_sections")
        .select("*")
        .eq("user_id", USER_ID);
      
      if (error) throw error;
      
      sections = {};
      data.forEach(row => {
        sections[row.section_id] = {
          name: row.name,
          icon: row.icon,
          links: row.links || []
        };
      });
    } catch (err) {
      console.error("Supabase 讀取失敗", err);
      loadLocalData();
      return;
    }
  } else {
    loadLocalData();
  }
  
  if (Object.keys(sections).length === 0) {
    sections.section_default = { name: "我的工具", icon: "📦", links: [] };
    if (USE_SUPABASE && supabase) {
      try {
        await supabase.from("toolbox_sections").insert({
          user_id: USER_ID,
          section_id: "section_default",
          name: "我的工具",
          icon: "📦",
          links: []
        });
      } catch (e) {
        console.error("初始化失敗", e);
      }
    } else {
      saveLocalData();
    }
  }
  currentSection = Object.keys(sections)[0];
}

function loadLocalData() {
  const saved = localStorage.getItem(STORAGE_KEY);
  if (saved) {
    try {
      sections = JSON.parse(saved);
    } catch (e) {
      sections = {};
    }
  }
}

async function saveData() {
  if (USE_SUPABASE && supabase) {
    try {
      for (const [secId, sec] of Object.entries(sections)) {
        await supabase
          .from("toolbox_sections")
          .upsert({
            user_id: USER_ID,
            section_id: secId,
            name: sec.name,
            icon: sec.icon,
            links: sec.links || []
          });
      }
    } catch (err) {
      console.error("Supabase 保存失敗", err);
      saveLocalData();
    }
  } else {
    saveLocalData();
  }
}

function saveLocalData() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(sections));
}

// ============ 標籤頁面 ============
function renderTabs() {
  const el = document.getElementById("sectionsTabsContainer");
  el.innerHTML = "";
  Object.keys(sections).forEach(id => {
    const tab = document.createElement("div");
    tab.className = "tab " + (id === currentSection ? "active" : "");
    tab.textContent = `${sections[id].icon} ${sections[id].name}`;
    tab.onclick = () => {
      currentSection = id;
      renderTabs();
      renderContent();
    };
    el.appendChild(tab);
  });
  const addTab = document.createElement("div");
  addTab.className = "tab add";
  addTab.textContent = "➕";
  addTab.onclick = showAddSectionModal;
  el.appendChild(addTab);
}

// ============ 內容區 ============
function renderContent() {
  const el = document.getElementById("contentArea");
  el.innerHTML = "";
  const sec = sections[currentSection];

  const header = document.createElement("div");
  header.className = "section-header";
  header.innerHTML = `
    <div class="section-icon-large" onclick="editSection()">${sec.icon}</div>
    <div class="section-info">
      <div class="section-name">${sec.name}</div>
      <div class="section-meta">${sec.links.length} 個工具</div>
    </div>
    <div class="section-actions">
      <button class="btn-sm" onclick="editSection()">編輯</button>
      <button class="btn-sm danger" onclick="deleteSection()">刪除</button>
    </div>
  `;
  el.appendChild(header);

  if (sec.links.length === 0) {
    el.innerHTML += `
      <div class="empty-state">
        <div class="empty-icon">🔗</div>
        <div>暫無工具，點擊下方新增</div>
      </div>
    `;
  } else {
    const list = document.createElement("div");
    list.className = "links-list";
    sec.links.forEach((link, i) => {
      const item = document.createElement("div");
      item.className = "link-item";
      item.innerHTML = `
        <div class="link-icon">${link.icon}</div>
        <div class="link-info">
          <div class="link-title">${link.title}</div>
          <div class="link-desc">${link.desc || "無描述"}</div>
          <div class="link-url">${link.url}</div>
        </div>
        <div class="link-actions">
          <button class="btn-icon" onclick="editLink(${i})">✎</button>
          <button class="btn-icon danger" onclick="deleteLink(${i})">✕</button>
        </div>
      `;
      list.appendChild(item);
    });
    el.appendChild(list);
  }

  const addBtn = document.createElement("button");
  addBtn.className = "add-btn";
  addBtn.textContent = "➕ 新增工具";
  addBtn.onclick = showAddLinkModal;
  el.appendChild(addBtn);
}

// ============ 分類操作 ============
function showAddSectionModal() {
  const name = prompt("輸入分類名稱 (例如：常用)");
  if (!name) return;
  const id = "sec_" + Date.now();
  sections[id] = { name: name.trim(), icon: "📌", links: [] };
  saveData();
  currentSection = id;
  renderTabs();
  renderContent();
}

function editSection() {
  document.getElementById("editSectionName").value = sections[currentSection].name;
  document.getElementById("editSectionIconDisplay").textContent = sections[currentSection].icon;
  document.getElementById("editSectionModal").classList.add("active");
}

function closeEditSectionModal() {
  document.getElementById("editSectionModal").classList.remove("active");
}

function confirmEditSection() {
  const name = document.getElementById("editSectionName").value.trim();
  if (!name) return alert("請輸入名稱");
  sections[currentSection].name = name;
  saveData();
  closeEditSectionModal();
  renderTabs();
  renderContent();
}

function deleteSection() {
  if (!confirm("確定刪除此分類？")) return;
  delete sections[currentSection];
  const keys = Object.keys(sections);
  currentSection = keys[0] || null;
  if (!currentSection && Object.keys(sections).length === 0) {
    sections.section_default = { name: "我的工具", icon: "📦", links: [] };
    currentSection = "section_default";
  }
  saveData();
  renderTabs();
  renderContent();
}

// ============ 工具操作 ============
function showAddLinkModal() {
  document.getElementById("addLinkModal").classList.add("active");
}

function closeAddLinkModal() {
  document.getElementById("addLinkModal").classList.remove("active");
  document.getElementById("newLinkTitle").value = "";
  document.getElementById("newLinkDesc").value = "";
  document.getElementById("newLinkUrl").value = "";
  document.getElementById("newLinkIconDisplay").textContent = "🔗";
}

function confirmAddLink() {
  const title = document.getElementById("newLinkTitle").value.trim();
  const desc = document.getElementById("newLinkDesc").value.trim();
  const url = document.getElementById("newLinkUrl").value.trim();
  const icon = document.getElementById("newLinkIconDisplay").textContent;
  if (!title || !url) return alert("請填名稱和 URL");
  sections[currentSection].links.push({ title, desc, url, icon });
  saveData();
  closeAddLinkModal();
  renderContent();
}

let editingLinkIndex = null;

function editLink(i) {
  editingLinkIndex = i;
  const link = sections[currentSection].links[i];
  document.getElementById("editLinkTitle").value = link.title;
  document.getElementById("editLinkDesc").value = link.desc;
  document.getElementById("editLinkUrl").value = link.url;
  document.getElementById("editLinkIconDisplay").textContent = link.icon;
  document.getElementById("editLinkModal").classList.add("active");
}

function closeEditLinkModal() {
  document.getElementById("editLinkModal").classList.remove("active");
  editingLinkIndex = null;
}

function confirmEditLink() {
  const title = document.getElementById("editLinkTitle").value.trim();
  const desc = document.getElementById("editLinkDesc").value.trim();
  const url = document.getElementById("editLinkUrl").value.trim();
  const icon = document.getElementById("editLinkIconDisplay").textContent;
  if (!title || !url) return alert("請填名稱和 URL");
  sections[currentSection].links[editingLinkIndex] = { title, desc, url, icon };
  saveData();
  closeEditLinkModal();
  renderContent();
}

function deleteLink(i) {
  if (!confirm("確定刪除？")) return;
  sections[currentSection].links.splice(i, 1);
  saveData();
  renderContent();
}

// ============ Emoji 選擇器 ============
let emojiMode = null;

function selectEmoji(mode) {
  emojiMode = mode;
  document.getElementById("emojiInput").value = "";
  document.getElementById("emojiPickerModal").classList.add("active");
}

function selectEmojiDirect(emoji) {
  const input = document.getElementById("emojiInput");
  input.value = emoji;
  input.focus();
}

function confirmEmoji() {
  const emoji = document.getElementById("emojiInput").value.trim();
  if (!emoji) return alert("請輸入 Emoji");
  
  if (emojiMode === "edit") {
    document.getElementById("editSectionIconDisplay").textContent = emoji;
  } else if (emojiMode === "link") {
    document.getElementById("newLinkIconDisplay").textContent = emoji;
  } else if (emojiMode === "editLink") {
    document.getElementById("editLinkIconDisplay").textContent = emoji;
  }
  closeEmojiPickerModal();
}

function closeEmojiPickerModal() {
  document.getElementById("emojiPickerModal").classList.remove("active");
  emojiMode = null;
}

// ============ 選單 ============
function showMenu() {
  document.getElementById("menuModal").classList.add("active");
}

function closeMenu() {
  document.getElementById("menuModal").classList.remove("active");
}

function exportData() {
  const data = JSON.stringify(sections, null, 2);
  const blob = new Blob([data], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `toolbox_${Date.now()}.json`;
  a.click();
  closeMenu();
}

function importData() {
  const input = document.createElement("input");
  input.type = "file";
  input.accept = ".json";
  input.onchange = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const json = JSON.parse(ev.target.result);
        sections = json;
        saveData();
        currentSection = Object.keys(sections)[0];
        renderTabs();
        renderContent();
        alert("匯入成功");
      } catch (err) {
        alert("檔案格式錯誤: " + err.message);
      }
    };
    reader.readAsText(file);
  };
  input.click();
  closeMenu();
}

function resetAll() {
  if (!confirm("確定要重置所有資料？此操作無法復原")) return;
  localStorage.clear();
  location.reload();
}

function goHome() {
  window.location.href = "index.html";
}

function setupRealtimeSync() {
  if (!USE_SUPABASE || !supabase) return;
  
  supabase
    .channel("toolbox_changes")
    .on("postgres_changes", {
      event: "*",
      schema: "public",
      table: "toolbox_sections",
      filter: `user_id=eq.${USER_ID}`
    }, (payload) => {
      console.log("收到更新", payload);
      loadData().then(() => {
        renderTabs();
        renderContent();
      });
    })
    .subscribe();
}

// ============ 啟動 ============
window.addEventListener("DOMContentLoaded", init);
</script>
