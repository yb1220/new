<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>虛擬商店 - 後台管理</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: #1a1a1a;
            color: #fff;
            padding-bottom: 20px;
            min-height: 100vh;
        }

        /* 導航欄 */
        .nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 55px;
            background: rgba(26, 26, 26, 0.95);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            z-index: 999;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .nav-left {
            display: flex;
            flex-direction: column;
        }

        .nav h1 {
            font-size: 22px;
            font-weight: 500;
            color: #81c7ff;
            line-height: 1.2;
        }

        .nav-subtitle {
            font-size: 12px;
            color: #aaa;
        }

        .nav button {
            padding: 8px 14px;
            border: none;
            border-radius: 10px;
            background: #5c9eff;
            color: white;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .nav button:hover {
            background: #4a8de6;
        }

        /* 後台面板 */
        .admin-page {
            padding: 70px 12px 20px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            margin-bottom: 6px;
            color: #ccc;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 10px;
            font-size: 15px;
            outline: none;
            background: rgba(255,255,255,0.05);
            color: #fff;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            border-color: #5c9eff;
            background: rgba(255,255,255,0.08);
        }

        .add-btn {
            width: 100%;
            padding: 14px;
            background: #34c759;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            margin-bottom: 24px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .add-btn:hover {
            background: #2db84f;
        }

        .admin-goods-item {
            background: rgba(255,255,255,0.05);
            padding: 14px;
            border-radius: 10px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .admin-goods-info {
            max-width: 70%;
        }

        .admin-goods-name {
            font-size: 16px;
            margin-bottom: 4px;
        }

        .admin-goods-meta {
            font-size: 12px;
            color: #aaa;
            margin-bottom: 4px;
        }

        .admin-goods-price {
            font-size: 14px;
            color: #ff9500;
            font-weight: bold;
        }

        .del-btn {
            padding: 8px 12px;
            background: #ff3b30;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .del-btn:hover {
            background: #e6352c;
        }

        .filter-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 8px 0 16px;
        }

        .filter-row label {
            font-size: 13px;
        }

        .filter-row select {
            padding: 6px 10px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.05);
            color: #fff;
            font-size: 13px;
            outline: none;
        }

        .filter-row select:focus {
            border-color: #5c9eff;
        }
    </style>
</head>
<body>

    <div class="nav">
        <div class="nav-left">
            <h1>虛擬商店後台</h1>
            <div class="nav-subtitle" id="adminUserText">檢查登入狀態中...</div>
        </div>
        <button id="backShopBtn">返回商城</button>
    </div>

    <!-- 後台頁面 -->
    <div id="adminPage" class="admin-page">
        <h2 style="margin:10px 0 16px; font-size:18px; color:#fff;">商品管理</h2>

        <div class="form-group">
            <label>商品名稱</label>
            <input type="text" id="goodsName" placeholder="請輸入商品名稱">
        </div>
        <div class="form-group">
            <label>商品價格（元）</label>
            <input type="number" id="goodsPrice" placeholder="請輸入價格">
        </div>
        <div class="form-group">
            <label>商品分類</label>
            <input type="text" id="goodsCategory" placeholder="例如：一般、禮物、票券...">
        </div>
        <div class="form-group">
            <label>圖標顏色（如 #ff3b30）</label>
            <input type="text" id="goodsColor" placeholder="#5c9eff">
        </div>
        <div class="form-group">
            <label>圖標文字/符號（如 🎁、A）</label>
            <input type="text" id="goodsIcon" placeholder="🎁">
        </div>

        <button class="add-btn" id="addGoodsBtn">新增商品</button>

        <h3 style="margin:20px 0 10px; font-size:16px; color:#ccc;">商品列表</h3>

        <div class="filter-row">
            <label for="adminCategoryFilter">分類篩選：</label>
            <select id="adminCategoryFilter">
                <option value="全部">全部</option>
            </select>
        </div>

        <div id="adminGoodsList"></div>
    </div>

<script>
    // 簡單登入檢查（沒有登入就導回帳號頁）
    const currentUser = JSON.parse(localStorage.getItem('currentUser') || 'null');
    const adminUserText = document.getElementById('adminUserText');

    if (!currentUser) {
        alert('請先登入帳號');
        window.location.href = 'account.html';
    } else {
        adminUserText.textContent = `目前登入：${currentUser.username || currentUser.email || '一般使用者'}`;
    }

    // 返回商城
    document.getElementById('backShopBtn').addEventListener('click', () => {
        window.location.href = 'index.html';
    });

    // 數據存儲
    let goods = JSON.parse(localStorage.getItem('goods')) || [
        { id: 1, name: '測試商品1', price: 99, color: '#5c9eff', icon: 'A', category: '一般' },
        { id: 2, name: '測試商品2', price: 199, color: '#ff3b30', icon: '🎁', category: '禮物' }
    ];

    if (!localStorage.getItem('goods')) {
        localStorage.setItem('goods', JSON.stringify(goods));
    }

    // 渲染分類篩選
    function renderAdminCategoryFilter() {
        const select = document.getElementById('adminCategoryFilter');
        const currentValue = select.value || '全部';
        const categories = new Set();
        goods.forEach(item => {
            if (item.category) {
                categories.add(item.category);
            }
        });

        select.innerHTML = '<option value="全部">全部</option>';
        categories.forEach(cat => {
            const option = document.createElement('option');
            option.value = cat;
            option.textContent = cat;
            select.appendChild(option);
        });

        const hasOption = Array.from(select.options).some(o => o.value === currentValue);
        if (hasOption) {
            select.value = currentValue;
        } else {
            select.value = '全部';
        }
    }

    // 渲染後台商品
    function renderAdminGoods() {
        const list = document.getElementById('adminGoodsList');
        list.innerHTML = '';
        const categoryFilter = document.getElementById('adminCategoryFilter').value || '全部';

        const filteredGoods = categoryFilter === '全部'
            ? goods
            : goods.filter(item => item.category === categoryFilter);

        if (filteredGoods.length === 0) {
            list.innerHTML = '<div style="padding:12px; font-size:14px; color:#ccc;">此分類下暫無商品</div>';
            return;
        }

        filteredGoods.forEach(item => {
            const div = document.createElement('div');
            div.className = 'admin-goods-item';
            div.innerHTML = `
                <div class="admin-goods-info">
                    <div class="admin-goods-name">${item.name}</div>
                    <div class="admin-goods-meta">
                        分類：${item.category || '未分類'}　|　圖標：${item.icon || '📦'}　|　顏色：${item.color || '#5c9eff'}
                    </div>
                    <div class="admin-goods-price">NT$${item.price}</div>
                </div>
                <button class="del-btn" data-id="${item.id}">刪除</button>
            `;
            list.appendChild(div);
        });

        // 刪除
        document.querySelectorAll('.del-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const id = Number(btn.dataset.id);
                goods = goods.filter(g => g.id !== id);
                localStorage.setItem('goods', JSON.stringify(goods));
                renderAdminCategoryFilter();
                renderAdminGoods();
            });
        });
    }

    // 新增商品
    document.getElementById('addGoodsBtn').addEventListener('click', () => {
        const name = document.getElementById('goodsName').value.trim();
        const price = document.getElementById('goodsPrice').value.trim();
        const category = document.getElementById('goodsCategory').value.trim() || '未分類';
        const color = document.getElementById('goodsColor').value.trim() || '#5c9eff';
        const icon = document.getElementById('goodsIcon').value.trim() || '📦';

        if (!name || !price) {
            alert('請填寫名稱和價格');
            return;
        }

        const newGood = {
            id: Date.now(),
            name,
            price: Number(price),
            color,
            icon,
            category
        };

        goods.push(newGood);
        localStorage.setItem('goods', JSON.stringify(goods));

        document.getElementById('goodsName').value = '';
        document.getElementById('goodsPrice').value = '';
        document.getElementById('goodsCategory').value = '';
        document.getElementById('goodsColor').value = '';
        document.getElementById('goodsIcon').value = '';

        alert('新增成功');
        renderAdminCategoryFilter();
        renderAdminGoods();
    });

    // 分類篩選事件
    document.getElementById('adminCategoryFilter').addEventListener('change', () => {
        renderAdminGoods();
    });

    // 初始化
    renderAdminCategoryFilter();
    renderAdminGoods();
</script>
</body>
</html>
