<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>虛擬商店 - 商城</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: #1a1a1a;
            color: #fff;
            padding-bottom: 70px;
            min-height: 100vh;
        }

        /* 導航欄 */
        .nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 55px;
            background: rgba(26, 26, 26, 0.95);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            z-index: 999;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .nav-left {
            display: flex;
            flex-direction: column;
        }

        .nav h1 {
            font-size: 22px;
            font-weight: 500;
            color: #81c7ff;
            line-height: 1.2;
        }

        .nav-subtitle {
            font-size: 12px;
            color: #aaa;
        }

        .nav button {
            padding: 8px 14px;
            border: none;
            border-radius: 10px;
            background: #5c9eff;
            color: white;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .nav button:hover {
            background: #4a8de6;
        }

        /* 頁面容器 */
        .page {
            margin-top: 65px;
            padding: 12px;
            display: none;
        }

        .page.active {
            display: block;
        }

        /* 分類選單 */
        .filter-bar {
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .filter-bar label {
            font-size: 14px;
            color: #ccc;
        }

        .filter-bar select {
            padding: 8px 10px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.05);
            color: #fff;
            font-size: 14px;
            outline: none;
        }

        .filter-bar select:focus {
            border-color: #5c9eff;
            background: rgba(255,255,255,0.08);
        }

        /* 商品列表 - 橫欄式 */
        .goods-list {
            display: flex;
            flex-direction: column;
            gap: 1px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            overflow: hidden;
        }

        .goods-item {
            display: flex;
            align-items: center;
            padding: 16px 12px;
            background: linear-gradient(90deg, rgba(26,26,26,0.8) 0%, rgba(40,40,40,0.6) 100%);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            transition: background 0.2s;
        }

        .goods-item:last-child {
            border-bottom: none;
        }

        .goods-item:hover {
            background: linear-gradient(90deg, rgba(40,40,40,0.8) 0%, rgba(60,60,60,0.6) 100%);
        }

        .goods-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            background: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            margin-right: 16px;
            flex-shrink: 0;
        }

        .goods-info {
            flex: 1;
        }

        .goods-name {
            font-size: 16px;
            margin-bottom: 4px;
            color: #fff;
        }

        .goods-category {
            font-size: 12px;
            color: #aaa;
            margin-bottom: 4px;
        }

        .goods-price {
            color: #ff9500;
            font-weight: bold;
            font-size: 15px;
        }

        .buy-btn {
            padding: 8px 16px;
            background: #5c9eff;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .buy-btn:hover {
            background: #4a8de6;
        }

        /* 底部欄 */
        .tabbar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: rgba(26, 26, 26, 0.95);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: space-around;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .tabbar button {
            background: none;
            border: none;
            font-size: 14px;
            color: #999;
            cursor: pointer;
            transition: color 0.2s;
        }

        .tabbar button.active {
            color: #5c9eff;
            font-weight: bold;
        }

        /* 訂單 */
        .order-item {
            background: rgba(255,255,255,0.05);
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 12px;
        }

        .order-item div:first-child {
            font-size: 16px;
            margin-bottom: 4px;
        }

        .order-item div:nth-child(2) {
            color: #ff9500;
            font-weight: bold;
            margin-bottom: 6px;
        }

        .order-item div:last-child {
            font-size: 12px;
            color: #999;
        }

        /* 客服按鈕 */
        .service-btn {
            position: fixed;
            bottom: 80px;
            right: 16px;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: #5c9eff;
            color: white;
            border: none;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(92, 158, 255, 0.4);
            transition: all 0.2s;
        }

        .service-btn:hover {
            background: #4a8de6;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <div class="nav">
        <div class="nav-left">
            <h1>虛擬商店</h1>
            <div class="nav-subtitle" id="welcomeText"></div>
        </div>
        <button id="loginBtn">登入帳號</button>
    </div>

    <!-- 商城頁面 -->
    <div id="shopPage" class="page active">
        <div class="filter-bar">
            <label for="categoryFilter">商品分類：</label>
            <select id="categoryFilter">
                <option value="全部">全部</option>
            </select>
        </div>
        <div class="goods-list" id="goodsList"></div>
    </div>

    <!-- 訂單頁面 -->
    <div id="orderPage" class="page">
        <h2 style="margin:10px 0 16px; font-size:18px; color:#fff;">我的訂單</h2>
        <div id="orderList"></div>
    </div>

    <div class="tabbar">
        <button class="tab active" data-target="shopPage">商城</button>
        <button class="tab" data-target="orderPage">訂單</button>
    </div>

    <button class="service-btn" id="serviceBtn">💬</button>

<script>
    // 使用者資訊（顯示歡迎詞用）
    const currentUser = JSON.parse(localStorage.getItem('currentUser') || 'null');
    const welcomeText = document.getElementById('welcomeText');
    if (currentUser && currentUser.username) {
        welcomeText.textContent = `歡迎，${currentUser.username}`;
    } else {
        welcomeText.textContent = '尚未登入';
    }

    // 登入按鈕 -> 帳號頁
    document.getElementById('loginBtn').addEventListener('click', () => {
        window.location.href = 'account.html';
    });

    // 數據存儲
    let goods = JSON.parse(localStorage.getItem('goods')) || [
        { id: 1, name: '測試商品1', price: 99, color: '#5c9eff', icon: 'A', category: '一般' },
        { id: 2, name: '測試商品2', price: 199, color: '#ff3b30', icon: '🎁', category: '禮物' }
    ];
    let orders = JSON.parse(localStorage.getItem('orders')) || [];

    // 如果本地沒有 goods，初始化一次
    if (!localStorage.getItem('goods')) {
        localStorage.setItem('goods', JSON.stringify(goods));
    }

    // 切換頁面
    const tabs = document.querySelectorAll('.tab');
    tabs.forEach(tab => {
        tab.addEventListener('click', () => {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            const target = tab.dataset.target;
            document.getElementById(target).classList.add('active');
            tab.classList.add('active');
        });
    });

    // 客服按鈕
    document.getElementById('serviceBtn').addEventListener('click', () => {
        alert('客服功能：\n電話：0800-123-456\nLine：@virtualshop\nEmail：service@virtualshop.com');
    });

    // 渲染分類選單
    function renderCategoryFilter() {
        const select = document.getElementById('categoryFilter');
        const currentValue = select.value || '全部';
        const categories = new Set();
        goods.forEach(item => {
            if (item.category) {
                categories.add(item.category);
            }
        });

        select.innerHTML = '<option value="全部">全部</option>';
        categories.forEach(cat => {
            const option = document.createElement('option');
            option.value = cat;
            option.textContent = cat;
            select.appendChild(option);
        });

        // 恢復原本選擇（如果還存在）
        const hasOption = Array.from(select.options).some(o => o.value === currentValue);
        if (hasOption) {
            select.value = currentValue;
        } else {
            select.value = '全部';
        }
    }

    // 渲染商城商品
    function renderShop() {
        const list = document.getElementById('goodsList');
        list.innerHTML = '';
        const categoryFilter = document.getElementById('categoryFilter').value || '全部';

        const filteredGoods = categoryFilter === '全部'
            ? goods
            : goods.filter(item => item.category === categoryFilter);

        if (filteredGoods.length === 0) {
            list.innerHTML = '<div style="padding:16px; font-size:14px; color:#ccc;">此分類下暫無商品</div>';
            return;
        }

        filteredGoods.forEach(item => {
            const div = document.createElement('div');
            div.className = 'goods-item';
            div.innerHTML = `
                <div class="goods-icon" style="background: ${item.color};">
                    ${item.icon || '📦'}
                </div>
                <div class="goods-info">
                    <div class="goods-name">${item.name}</div>
                    <div class="goods-category">${item.category ? '分類：' + item.category : '分類：未分類'}</div>
                    <div class="goods-price">NT$${item.price}</div>
                </div>
                <button class="buy-btn" data-id="${item.id}">立即購買</button>
            `;
            list.appendChild(div);
        });

        // 購買事件
        document.querySelectorAll('.buy-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const id = Number(btn.dataset.id);
                const good = goods.find(g => g.id === id);
                if (!good) return;
                orders.push({
                    orderId: Date.now(),
                    goodsName: good.name,
                    price: good.price,
                    time: new Date().toLocaleString('zh-TW')
                });
                localStorage.setItem('orders', JSON.stringify(orders));
                alert('購買成功！');
                renderOrders();
            });
        });
    }

    // 渲染訂單
    function renderOrders() {
        const list = document.getElementById('orderList');
        list.innerHTML = '';
        if (orders.length === 0) {
            list.innerHTML = '<div style="padding:16px; font-size:14px; color:#ccc;">目前沒有訂單</div>';
            return;
        }
        orders.forEach(o => {
            const div = document.createElement('div');
            div.className = 'order-item';
            div.innerHTML = `
                <div>商品：${o.goodsName}</div>
                <div>價格：NT$${o.price}</div>
                <div>訂單時間：${o.time}</div>
            `;
            list.appendChild(div);
        });
    }

    // 分類選單變更時重新渲染
    document.getElementById('categoryFilter').addEventListener('change', () => {
        renderShop();
    });

    // 初始化
    renderCategoryFilter();
    renderShop();
    renderOrders();
</script>
</body>
</html>
